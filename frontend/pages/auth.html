<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse | Acceso</title>
  <meta name="description" content="Inicia sesión o crea una cuenta en Synapse para acceder a la gestión clínica.">
  <script>
    (function () {
      const theme = localStorage.getItem('synapseTheme') === 'dark' ? 'dark' : 'light';
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="synapse-page auth-page">
  <nav class="navbar navbar-expand-lg synapse-navbar auth-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-3" href="../index.html">
        <span class="brand-logo-frame" aria-hidden="true">
          <span class="brand-logo-symbol"> <img src="../images/logo.png" alt="Logo de Synapse" class="brand-logo-image">
          </span>
        </span>
        <span>
          <small class="brand-subtitle">SYNAPSE</small>
        </span>
      </a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <a class="btn btn-nav-secondary rounded-pill px-4" href="../index.html">Volver al inicio</a>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Cambiar a modo oscuro"
          title="Cambiar a modo oscuro">
          <svg id="themeToggleIcon" class="theme-toggle-icon" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <path d="M32 10v44M18 18l10 10M46 18 36 28M12 32h12M40 32h12M18 46l10-10M46 46 36 36"></path>
            <circle cx="32" cy="32" r="6"></circle>
            <path d="M24 16c0 4 3 7 8 10 5-3 8-6 8-10"></path>
            <path d="M24 48c0-4 3-7 8-10 5 3 8 6 8 10"></path>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="auth-shell container-fluid px-3 px-md-4 py-4 py-lg-5" id="authShell">
    <div class="row min-vh-100 align-items-center justify-content-center">
      <div class="col-lg-5 col-md-6">
        <div class="auth-panel" id="authPanel">
          <div class="text-center mb-5">
            <a class="d-inline-flex align-items-center gap-3 text-decoration-none" href="../index.html">
              <span class="brand-logo-frame" aria-hidden="true">
                <span class="brand-logo-symbol">
                  <img src="../images/logo.png" alt="Logo de Synapse" class="brand-logo-image">
                </span>
              </span>
              <div>
                <small class="brand-subtitle">SYNAPSE</small>
              </div>
            </a>
          </div>

          <div class="text-center mb-4">
            <span class="section-kicker">Acceso seguro</span>
            <h1 class="h3 fw-bold mt-2 mb-0" id="authTitle">Iniciar sesión</h1>
            <p class="text-muted small mt-2">Ingresa tus credenciales para acceder</p>
          </div>

          <div class="alert alert-danger d-none mt-4" id="authError" role="alert"></div>
          <div class="alert alert-success d-none mt-4" id="authSuccess" role="alert"></div>

          <form class="auth-form active" id="loginForm" novalidate>
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label" for="loginEmail">Correo electrónico</label>
                <input class="form-control form-control-lg synapse-input" type="email" id="loginEmail" name="email"
                  placeholder="usuario@clinica.com" required>
              </div>
              <div class="col-12">
                <label class="form-label" for="loginPassword">Contraseña</label>
                <input class="form-control form-control-lg synapse-input" type="password" id="loginPassword"
                  name="password" placeholder="Tu contraseña" required>
              </div>
              <div class="col-12 pt-2">
                <button class="btn btn-nav-primary btn-lg rounded-pill px-5 w-100" type="submit"
                  id="loginSubmit">Iniciar sesión</button>
              </div>
            </div>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted small mb-0">¿Problemas para acceder? Contacta a tu administrador</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
